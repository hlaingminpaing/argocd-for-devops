apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app-k8s
  namespace: argocd

  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  source:
    repoURL: https://github.com/hlaingminpaing/argocd-for-devops.git
    targetRevision: HEAD
    path: k8s-manifests
    
  destination:
    server: https://kubernetes.default.svc
    namespace: my-app-k8s

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ApplyOutOfSyncOnly=true

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-app
  namespace: my-app-k8s       # Must match deployment namespace
  labels:
    app: my-app
  annotations:
    # Tell the ingress-nginx controller to handle this Ingress
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  # Must match your installed Ingress Controller class
  ingressClassName: nginx

  rules:
    - host: my-app.local      # Add to /etc/hosts → <node-ip> my-app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: my-app           # Must match Service name
                port:
                  number: 80           # Must match Service port

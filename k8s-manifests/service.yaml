apiVersion: v1
kind: Service
metadata:
  name: my-app
  namespace: my-app-k8s      # Must match deployment namespace
  labels:
    app: my-app
spec:
  # ── Service type ────────────────────────────────────────────
  # ClusterIP  → Internal only (use with Ingress)
  # NodePort   → Exposed on every node's IP at a static port
  # LoadBalancer → External LB (cloud providers)
  type: ClusterIP

  selector:
    app: my-app               # Routes traffic to pods with this label

  ports:
    - name: http
      port: 80                # Port the Service listens on
      targetPort: 80          # Port on the Pod (matches containerPort)
      protocol: TCP

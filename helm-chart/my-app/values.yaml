# =============================================================
# values.yaml — Default configuration for my-app Helm chart
# Override these in ArgoCD Application spec or environment-
# specific values files (values-staging.yaml, values-prod.yaml)
# =============================================================

# ── App metadata ──────────────────────────────────────────────
replicaCount: 2

image:
  repository: nginx
  tag: "1.25-alpine"
  pullPolicy: IfNotPresent

# ── Service ───────────────────────────────────────────────────
service:
  type: ClusterIP   # ClusterIP | NodePort | LoadBalancer
  port: 80
  targetPort: 80

# ── Ingress ───────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx            # ingress-nginx controller class
  host: my-app.local          # Change to your actual domain
  path: /
  pathType: Prefix
  annotations: {}
  # annotations:
  #   nginx.ingress.kubernetes.io/rewrite-target: /

# ── Resource requests & limits ────────────────────────────────
resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

# ── Health probes ─────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 10

# ── Pod settings ──────────────────────────────────────────────
podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

# ── Environment variables injected into the container ─────────
env:
  - name: APP_ENV
    value: "production"
  - name: LOG_LEVEL
    value: "info"

# ── ConfigMap — optional custom nginx config ─────────────────
configMap:
  enabled: false
  # data:
  #   nginx.conf: |
  #     ...

# ── Autoscaling (HPA) ─────────────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
